# bye_emails configuration

llm:
  provider: openai
  model: gpt-5.4-nano                    # fast + cheap for triage
  summarize_model: gpt-5.4-nano          # model for newsletter summaries
  api_key_env: OPENAI_API_KEY            # env var holding the API key

accounts:
  - name: personal
    host: imap.gmail.com
    port: 993
    secure: true
    auth:
      user_env: GMAIL_USER
      pass_env: GMAIL_APP_PASSWORD
    mailbox: INBOX
    processed_label: bye_emails/processed
    poll_interval: 30  # fallback polling interval in seconds

  - name: cldstart
    host: imap.gmail.com
    port: 993
    secure: true
    auth:
      user_env: CLDSTART_GMAIL_USER
      pass_env: CLDSTART_GMAIL_APP_PASSWORD
    mailbox: INBOX
    processed_label: bye_emails/processed
    poll_interval: 30  # fallback polling interval in seconds

channels:
  telegram:
    bot_token_env: TELEGRAM_BOT_TOKEN
    chat_id_env: TELEGRAM_CHAT_ID

rules:
  - name: spam-like
    description: >
      Marketing emails, promotional offers, social media notifications,
      automated notifications that don't require action. Things like
      "someone liked your post", store promotions, app notifications, etc.
    action: notify_and_archive
    notify_template: short

  - name: receipts
    description: >
      Receipts, invoices, billing statements, e-receipts, payment
      confirmations, subscription receipts, vendor invoices, SaaS receipts,
      and bookkeeping copies that only need to be filed. If the message says
      payment failed, action is required, a payment method must be updated,
      a bill is overdue, or service may be interrupted, classify it as
      needs_attention instead.
    action: notify_and_archive
    notify_template: short

  - name: newsletters
    description: >
      Newsletters I'm subscribed to, especially financial newsletters.
      Investment analysis, market commentary, stock picks, research reports.
    action: summarize_and_archive
    notify_template: summary

  - name: security
    description: >
      OTP codes, login verification, 2FA codes, password reset links,
      security alerts, login notifications from services.
    action: extract_and_archive
    notify_template: security

  - name: travel
    description: >
      Flight confirmations, hotel reservations, train tickets,
      car rentals, travel itineraries, booking modifications.
    action: calendar_and_archive
    notify_template: travel

  - name: needs_attention
    description: >
      Emails from real people that need a response, important
      business emails, anything requiring my direct action or review.
    action: notify_keep
    notify_template: full

plugins:
  calendar:
    provider: icloud
    server_url: https://caldav.icloud.com
    auth_method: Basic
    credentials:
      username: CALDAV_USERNAME
      password: CALDAV_PASSWORD
    calendar_name: Travel

    # Google Calendar example:
    # provider: google
    # server_url: https://apidata.googleusercontent.com/caldav/v2/
